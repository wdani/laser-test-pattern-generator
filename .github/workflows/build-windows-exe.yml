name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build Windows executable
    runs-on: windows-2022

    env:
      APP_NAME: LaserTestPatternGenerator
      PACKAGE_DIR: Laser_Test_Pattern_Generator_windows
      ARTIFACT_NAME: Laser_Test_Pattern_Generator_windows_experimental_${{ github.run_number }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: python -m pip install --upgrade pyinstaller

      - name: Set package variables
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME
          } else {
            $version = "manual-$env:GITHUB_RUN_NUMBER"
          }

          "VERSION=$version" >> $env:GITHUB_ENV
          "ZIP_NAME=Laser_Test_Pattern_Generator_Windows_$version.zip" >> $env:GITHUB_ENV

      - name: Compile main script
        run: python -m py_compile makera_material_test_generator.py

      - name: Compile GUI launcher
        run: python -m py_compile run_gui.py

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Build executable with PyInstaller
        shell: pwsh
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --name $env:APP_NAME `
            --windowed `
            --onedir `
            --contents-directory "_internal" `
            run_gui.py

      - name: Stage distributable package
        shell: pwsh
        run: |
          $stageRoot = Join-Path $PWD "package"
          $packagePath = Join-Path $stageRoot $env:PACKAGE_DIR
          Remove-Item -Recurse -Force $stageRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $packagePath | Out-Null

          Copy-Item -Path "dist\$env:APP_NAME\*" -Destination $packagePath -Recurse -Force
          Copy-Item -Path "README.md" -Destination $packagePath -Force
          Copy-Item -Path "LICENSE.txt" -Destination $packagePath -Force
          Copy-Item -Path "CHANGELOG.md" -Destination $packagePath -Force
          Copy-Item -Path "RELEASE_NOTES.txt" -Destination $packagePath -Force
          Copy-Item -Path "docs" -Destination $packagePath -Recurse -Force
          Copy-Item -Path "templates" -Destination $packagePath -Recurse -Force
          Copy-Item -Path "presets" -Destination $packagePath -Recurse -Force

          $requiredPaths = @(
            "$packagePath\$env:APP_NAME.exe",
            "$packagePath\_internal",
            "$packagePath\templates",
            "$packagePath\presets",
            "$packagePath\docs",
            "$packagePath\README.md",
            "$packagePath\LICENSE.txt",
            "$packagePath\CHANGELOG.md",
            "$packagePath\RELEASE_NOTES.txt"
          )

          foreach ($path in $requiredPaths) {
            if (-not (Test-Path $path)) {
              throw "Missing expected package path: $path"
            }
          }

      - name: Create release ZIP
        if: github.ref_type == 'tag'
        shell: pwsh
        run: |
          Compress-Archive -Path "package\$env:PACKAGE_DIR" -DestinationPath "dist\$env:ZIP_NAME" -Force

      - name: Upload executable package artifact
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: package/${{ env.PACKAGE_DIR }}

      - name: Upload Windows ZIP to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ZIP_NAME }}
